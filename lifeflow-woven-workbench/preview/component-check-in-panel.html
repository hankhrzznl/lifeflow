<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打卡面板 — LifeFlow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
/* Page scaffold — NOT extracted */
body { margin: 0; padding: var(--space-md); background: var(--color-surface); font-family: var(--font-family-body); color: var(--color-text-primary); }
.specimen { display: flex; flex-direction: column; gap: var(--space-lg); max-width: 960px; margin: 0 auto; }
.story { display: flex; flex-direction: column; gap: var(--space-sm); }
.story-label { font-family: var(--font-family-body); font-size: var(--font-size-caption); font-weight: var(--font-weight-semibold); color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.5px; padding-left: var(--space-xs); }
.stage { position: relative; }
hr.divider { border: none; border-top: 1px solid var(--color-border-light); margin: 0; width: 100%; }
.demo-overlay { position: relative; width: 100%; min-height: 540px; background: var(--color-surface); border-radius: var(--radius-lg); overflow: hidden; display: flex; align-items: center; justify-content: center; }

/* @component-css-start */
.cip-overlay { position: absolute; inset: 0; background: rgba(61,52,46,0.4); display: flex; align-items: center; justify-content: center; z-index: 10; }
.cip-panel { position: relative; background: var(--color-surface-card); border-radius: var(--radius-xl); box-shadow: var(--shadow-3); padding: var(--space-xl); width: 100%; max-width: 360px; margin: var(--space-lg); display: flex; flex-direction: column; gap: var(--space-lg); }
.cip-tape { position: absolute; top: -12px; left: 24px; width: 60px; height: 24px; background: linear-gradient(180deg, rgba(232,221,212,0.85), rgba(212,197,181,0.9)); border-radius: var(--radius-sm); transform: rotate(-3deg); }
.cip-header { font-family: var(--font-family-display); font-size: var(--font-size-h2); font-weight: var(--font-weight-semibold); color: var(--color-text-primary); line-height: var(--line-height-tight); text-align: center; }
.cip-divider { border: none; border-top: 1px solid var(--color-border-light); margin: 0; }
.cip-field { display: flex; flex-direction: column; gap: var(--space-sm); }
.cip-field-mt { margin-top: var(--space-md); }
.cip-label { font-family: var(--font-family-body); font-size: var(--font-size-body-sm); color: var(--color-text-secondary); }
.cip-label-accent { font-family: var(--font-family-body); font-size: var(--font-size-body-sm); color: var(--color-text-primary); font-weight: var(--font-weight-medium); }
.cip-input-row { display: flex; align-items: center; gap: var(--space-sm); }
.cip-input { flex: 1; border: 1.5px solid var(--color-border); border-radius: var(--radius-md); padding: var(--space-sm) var(--space-md); font-family: var(--font-family-body); font-size: var(--font-size-body); color: var(--color-text-primary); background: var(--color-surface-card); outline: none; min-width: 0; transition: border-color .15s; }
.cip-input:focus { border-color: var(--color-primary); }
.cip-rating-row { display: flex; gap: var(--space-sm); align-items: center; flex-wrap: wrap; }
.cip-rating-btn { width: 36px; height: 36px; border-radius: var(--radius-full); border: 1.5px solid var(--color-border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .15s, border-color .15s; padding: 0; }
.cip-rating-btn:hover { border-color: var(--color-primary); background: var(--color-primary-light); }
.cip-rating-btn.is-selected { background: var(--color-primary); border-color: var(--color-primary); }
.cip-rating-btn:disabled { cursor: default; }
.cip-actions { display: flex; gap: var(--space-md); }
.cip-btn { flex: 1; display: inline-flex; align-items: center; justify-content: center; font-family: var(--font-family-body); font-size: var(--font-size-body-sm); font-weight: var(--font-weight-medium); border-radius: var(--radius-md); cursor: pointer; transition: background .15s, border-color .15s; white-space: nowrap; padding: var(--space-md) var(--space-xl); min-width: 0; border: 1.5px solid transparent; }
.cip-btn-primary { background: var(--color-primary); color: var(--color-text-inverse); border-color: var(--color-primary); }
.cip-btn-primary:hover { background: var(--color-primary-hover); border-color: var(--color-primary-hover); }
.cip-btn-secondary { background: var(--color-surface-card); color: var(--color-secondary); border-color: var(--color-border); }
.cip-btn-secondary:hover { background: var(--color-surface-card-hover); }
.cip-btn:disabled { opacity: 0.5; cursor: default; }
.cip-panel.is-completed .cip-rating-btn { pointer-events: none; opacity: 0.7; }
.cip-completed-icon { display: flex; align-items: center; justify-content: center; padding: var(--space-lg) 0; }
.cip-completed-check { width: 64px; height: 64px; border-radius: var(--radius-full); background: var(--color-success); display: flex; align-items: center; justify-content: center; }
.cip-completed-check svg { stroke: var(--color-text-inverse); }
.cip-completed-msg { font-family: var(--font-family-display); font-size: var(--font-size-h2); color: var(--color-text-primary); text-align: center; }
.cip-completed-sub { font-family: var(--font-family-body); font-size: var(--font-size-body-sm); color: var(--color-text-secondary); text-align: center; }
/* @component-css-end */
</style>
</head>
<body>
<div class="specimen">

<div class="story">
<div class="story-label">编辑态</div>
<div class="stage">
<div class="demo-overlay">
<div class="cip-overlay">
<div class="cip-panel">
<div class="cip-tape"></div>
<div class="cip-header">词汇 · 第15天</div>
<hr class="cip-divider">
<div class="cip-field">
<div class="cip-label">今日要织: <span class="cip-label-accent">50个单词</span></div>
<div class="cip-input-row">
<span class="cip-label">实际织了:</span>
<input class="cip-input" type="number" placeholder="0" value="42" min="0" max="50">
<span class="cip-label">个</span>
</div>
</div>
<div class="cip-field">
<div class="cip-label">感觉如何?</div>
<div class="cip-rating-row">
<button class="cip-rating-btn is-selected" aria-label="评分 1"></button>
<button class="cip-rating-btn is-selected" aria-label="评分 2"></button>
<button class="cip-rating-btn is-selected" aria-label="评分 3"></button>
<button class="cip-rating-btn is-selected" aria-label="评分 4"></button>
<button class="cip-rating-btn is-selected" aria-label="评分 5"></button>
<button class="cip-rating-btn is-selected" aria-label="评分 6"></button>
<button class="cip-rating-btn is-selected" aria-label="评分 7"></button>
<button class="cip-rating-btn" aria-label="评分 8"></button>
<button class="cip-rating-btn" aria-label="评分 9"></button>
<button class="cip-rating-btn" aria-label="评分 10"></button>
</div>
</div>
<div class="cip-actions">
<button class="cip-btn cip-btn-secondary">取消</button>
<button class="cip-btn cip-btn-primary">织完这一针</button>
</div>
</div>
</div>
</div>
</div>
</div>

<hr class="divider">

<div class="story">
<div class="story-label">已完成</div>
<div class="stage">
<div class="demo-overlay">
<div class="cip-overlay">
<div class="cip-panel is-completed">
<div class="cip-tape"></div>
<div class="cip-header">词汇 · 第15天</div>
<hr class="cip-divider">
<div class="cip-completed-icon">
<div class="cip-completed-check">
<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
</div>
</div>
<div class="cip-completed-msg">已打卡</div>
<div class="cip-completed-sub">今日织了 50 个单词</div>
<div class="cip-field cip-field-mt">
<div class="cip-label">今日要织: <span class="cip-label-accent">50个单词</span></div>
<div class="cip-input-row">
<span class="cip-label">实际织了:</span>
<span class="cip-label-accent">50 个</span>
</div>
</div>
<div class="cip-field">
<div class="cip-label">感觉如何?</div>
<div class="cip-rating-row">
<button class="cip-rating-btn is-selected" aria-label="评分 1" disabled></button>
<button class="cip-rating-btn is-selected" aria-label="评分 2" disabled></button>
<button class="cip-rating-btn is-selected" aria-label="评分 3" disabled></button>
<button class="cip-rating-btn is-selected" aria-label="评分 4" disabled></button>
<button class="cip-rating-btn is-selected" aria-label="评分 5" disabled></button>
<button class="cip-rating-btn is-selected" aria-label="评分 6" disabled></button>
<button class="cip-rating-btn is-selected" aria-label="评分 7" disabled></button>
<button class="cip-rating-btn is-selected" aria-label="评分 8" disabled></button>
<button class="cip-rating-btn is-selected" aria-label="评分 9" disabled></button>
<button class="cip-rating-btn is-selected" aria-label="评分 10" disabled></button>
</div>
</div>
<div class="cip-actions">
<button class="cip-btn cip-btn-secondary" disabled>返回</button>
</div>
</div>
</div>
</div>
</div>
</div>

</div>
</body>
</html>
