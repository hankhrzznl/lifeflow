<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>按钮 - LifeFlow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
/* Page scaffold — NOT extracted */
body { margin: 0; padding: 12px; background: var(--color-surface); font-family: var(--font-family-body); color: var(--color-text-primary); }
.row { display: flex; gap: 12px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
.label { font-size: var(--font-size-caption); color: var(--color-text-tertiary); min-width: 92px; flex-shrink: 0; }
hr.divider { border: none; border-top: 1px solid var(--color-border-light); margin: 16px 0; }

/* @component-css-start */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; border: none; cursor: pointer; font-family: var(--font-family-body); font-weight: var(--font-weight-medium); white-space: nowrap; transition: background .15s, border-color .15s, opacity .15s; flex-shrink: 0; }
.btn-primary { background: var(--color-primary); color: var(--color-text-inverse); border-radius: var(--radius-md); }
.btn-primary:hover { background: var(--color-primary-hover); }
.btn-primary:active { filter: brightness(.92); }
.btn-secondary { background: var(--color-surface-card); color: var(--color-secondary); border: 1px solid var(--color-secondary); border-radius: var(--radius-md); }
.btn-secondary:hover { background: var(--color-surface-card-hover); }
.btn-secondary:active { filter: brightness(.95); }
.btn-ghost { background: transparent; color: var(--color-secondary); border-radius: var(--radius-md); }
.btn-ghost:hover { background: var(--color-primary-light); }
.btn-ghost:active { filter: brightness(.95); }
.btn-icon { border-radius: var(--radius-full); background: transparent; color: var(--color-secondary); }
.btn-icon:hover { background: var(--color-primary-light); }
.btn-icon:active { filter: brightness(.95); }
.btn-success { background: var(--color-success); color: var(--color-text-inverse); }
.btn-success:hover { filter: brightness(.92); }
.btn-sm { height: 32px; min-width: 32px; padding: 0 12px; font-size: var(--font-size-body-sm); }
.btn-md { height: 40px; min-width: 40px; padding: 0 16px; font-size: var(--font-size-body); }
.btn-lg { height: 48px; min-width: 48px; padding: 0 24px; font-size: var(--font-size-h3); }
.btn-icon.btn-sm { width: 32px; padding: 0; }
.btn-icon.btn-md { width: 40px; padding: 0; }
.btn-icon.btn-lg { width: 48px; padding: 0; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
/* @component-css-end */
</style>
</head>
<body>

<div class="row">
  <span class="label">操作变体</span>
</div>

<div class="row">
  <button class="btn btn-primary btn-md">开始编织</button>
  <button class="btn btn-secondary btn-md">取消</button>
  <button class="btn btn-ghost btn-md">了解更多</button>
</div>

<div class="row">
  <button class="btn btn-primary btn-success btn-md">编织完成</button>
  <button class="btn btn-primary btn-md" disabled>开始编织</button>
  <button class="btn btn-secondary btn-md" disabled>取消</button>
  <button class="btn btn-ghost btn-md" disabled>了解更多</button>
</div>

<hr class="divider">

<div class="row">
  <span class="label">尺寸对比</span>
</div>

<div class="row">
  <button class="btn btn-primary btn-sm">小号</button>
  <button class="btn btn-primary btn-md">中号</button>
  <button class="btn btn-primary btn-lg">大号</button>
</div>

<div class="row">
  <button class="btn btn-secondary btn-sm">小号</button>
  <button class="btn btn-secondary btn-md">中号</button>
  <button class="btn btn-secondary btn-lg">大号</button>
</div>

<div class="row">
  <button class="btn btn-ghost btn-sm">小号</button>
  <button class="btn btn-ghost btn-md">中号</button>
  <button class="btn btn-ghost btn-lg">大号</button>
</div>

<div class="row">
  <button class="btn btn-icon btn-sm"><img src="https://cdn.jsdelivr.net/npm/lucide-static@1.8.0/icons/search.svg" width="16" height="16" alt="搜索"></button>
  <button class="btn btn-icon btn-md"><img src="https://cdn.jsdelivr.net/npm/lucide-static@1.8.0/icons/search.svg" width="20" height="20" alt="搜索"></button>
  <button class="btn btn-icon btn-lg"><img src="https://cdn.jsdelivr.net/npm/lucide-static@1.8.0/icons/search.svg" width="24" height="24" alt="搜索"></button>
</div>

</body>
</html>
