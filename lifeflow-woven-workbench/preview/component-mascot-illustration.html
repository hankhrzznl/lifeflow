<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>小织插画 - LifeFlow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
/* Page scaffold — NOT extracted */
body { margin: 0; padding: var(--space-md); background: var(--color-surface); font-family: var(--font-family-body); color: var(--color-text-primary); }
.specimen { display: flex; flex-direction: column; gap: var(--space-sm); }
.story { display: flex; gap: var(--space-xl); align-items: flex-start; flex-wrap: wrap; }
.rail { display: flex; flex-direction: column; align-items: center; gap: var(--space-xs); }
.story-label { font-size: var(--font-size-caption); color: var(--color-text-tertiary); text-align: center; white-space: nowrap; }
/* @component-css-start */
/* Component definitions — extracted to components.css */
.mascot { position: relative; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.fox { position: relative; width: 60px; height: 80px; }
.fox-head { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 44px; height: 38px; background: var(--color-primary-light); border: 2px dashed var(--color-primary); border-radius: 55% 45% 48% 52% / 62% 60% 38% 40%; }
.fox-ear-l { position: absolute; top: -5px; left: 5px; width: 10px; height: 13px; background: var(--color-primary-light); border: 2px dashed var(--color-primary); border-radius: 62% 52% 18% 28%; transform: rotate(-18deg); }
.fox-ear-r { position: absolute; top: -5px; right: 5px; width: 10px; height: 13px; background: var(--color-primary-light); border: 2px dashed var(--color-primary); border-radius: 52% 62% 28% 18%; transform: rotate(18deg); }
.fox-eye-l { position: absolute; top: 11px; left: 9px; width: 5px; height: 6px; background: var(--color-text-primary); border-radius: 55% 45% 50% 50%; }
.fox-eye-r { position: absolute; top: 11px; right: 9px; width: 5px; height: 6px; background: var(--color-text-primary); border-radius: 45% 55% 50% 50%; }
.fox-nose { position: absolute; top: 19px; left: 50%; transform: translateX(-50%); width: 6px; height: 5px; background: var(--color-primary); border-radius: 48% 52% 55% 45%; }
.fox-snout { position: absolute; top: 23px; left: 50%; transform: translateX(-50%); width: 18px; height: 12px; background: var(--color-primary-light); border: 1px dashed var(--color-primary); border-radius: 38% 42% 58% 52%; }
.fox-body { position: absolute; top: 36px; left: 50%; transform: translateX(-50%); width: 32px; height: 28px; background: var(--color-primary-light); border: 2px dashed var(--color-primary); border-radius: 48% 52% 45% 55% / 38% 42% 62% 58%; }
.fox-tail { position: absolute; bottom: 2px; right: -22px; width: 28px; height: 14px; background: var(--color-primary-light); border: 2px dashed var(--color-primary); border-radius: 58% 42% 35% 65% / 52% 48% 52% 48%; transform: rotate(-18deg); }
/* State transforms */
.mascot.idle .fox { transform: rotate(-8deg); }
.mascot.confused .fox { transform: rotate(-10deg); }
.mascot.celebrating .fox { transform: rotate(5deg); }
/* Needles */
.needle { position: absolute; width: 3px; height: 40px; background: var(--color-border-dashed); border-radius: var(--radius-full); }
.needle-l { top: 8px; left: 17px; transform: rotate(-32deg); }
.needle-r { top: 8px; right: 17px; transform: rotate(32deg); }
/* Thread (weaving) */
.thread { position: absolute; top: 26px; left: 12px; width: 36px; height: 2px; background: var(--color-knit-progress); border-radius: 1px; transform: rotate(-6deg); }
/* Yarn ball cluster (idle) */
.yarn-ball { position: absolute; width: 18px; height: 18px; border: 2px dashed var(--color-knit-progress); border-radius: 42% 58% 55% 45%; }
.yarn-ball-1 { bottom: 6px; right: -26px; }
.yarn-ball-2 { bottom: 2px; right: -12px; width: 14px; height: 14px; }
.yarn-ball-3 { bottom: 12px; right: -20px; width: 12px; height: 12px; border-color: var(--color-knit-partial); }
.yarn-thread { position: absolute; height: 2px; background: var(--color-knit-progress); border-radius: 1px; }
.yarn-thread-1 { bottom: 16px; right: -18px; width: 14px; transform: rotate(-25deg); }
.yarn-thread-2 { bottom: 12px; right: -12px; width: 10px; transform: rotate(15deg); }
/* Checkmark (completed) */
.chk-circle { position: absolute; top: -8px; right: 6px; width: 18px; height: 18px; border: 2px dashed var(--color-success); border-radius: 48% 52% 50% 50%; }
.chk-mark { position: absolute; top: -3px; right: 12px; width: 6px; height: 10px; border-right: 2px solid var(--color-success); border-bottom: 2px solid var(--color-success); transform: rotate(45deg); }
/* Raised arms */
.arm { position: absolute; top: 8px; width: 3px; height: 18px; background: var(--color-primary); border-radius: var(--radius-full); }
.arm-l { left: -8px; transform: rotate(-42deg); }
.arm-r { right: -8px; transform: rotate(42deg); }
/* Question mark (confused) */
.qmark { position: absolute; top: -14px; right: 8px; font-family: var(--font-family-display); font-size: var(--font-size-h3); color: var(--color-warning); font-weight: var(--font-weight-bold); line-height: 1; }
/* Broken thread (confused) */
.th-broken { position: absolute; top: 22px; height: 2px; background: var(--color-knit-progress); border-radius: 1px; }
.th-broken-l { left: 10px; width: 14px; transform: rotate(-12deg); }
.th-broken-r { right: 10px; width: 10px; transform: rotate(8deg); }
/* Confetti dots (celebrating) */
.dot { position: absolute; width: 5px; height: 5px; border-radius: 45% 55% 50% 50%; }
.dot-d1 { top: 4px; left: 52px; background: var(--color-knit-progress); }
.dot-d2 { top: 10px; left: 64px; background: var(--color-success); }
.dot-d3 { top: 2px; left: 62px; background: var(--color-knit-partial); width: 4px; height: 4px; }
.dot-d4 { bottom: 22px; left: 54px; background: var(--color-info); }
.dot-d5 { bottom: 16px; left: 66px; background: var(--color-warning); width: 4px; height: 4px; }
.dot-d6 { top: 6px; left: 58px; background: var(--color-knit-progress); width: 6px; height: 6px; }
/* Small yarn balls (celebrating) */
.celeb-yarn { position: absolute; width: 12px; height: 12px; border: 2px dashed var(--color-knit-partial); border-radius: 48% 52% 44% 56%; }
.celeb-yarn-1 { bottom: 6px; right: -28px; }
.celeb-yarn-2 { bottom: 20px; right: -24px; border-color: var(--color-knit-done); }
/* @component-css-end */
</style>
</head>
<body>
<div class="specimen">
<div class="story">
<div class="rail">
<span class="story-label">等待态</span>
<div class="mascot idle">
<div class="fox">
<div class="fox-ear-l"></div><div class="fox-ear-r"></div>
<div class="fox-head"><div class="fox-eye-l"></div><div class="fox-eye-r"></div><div class="fox-nose"></div><div class="fox-snout"></div></div>
<div class="fox-body"></div><div class="fox-tail"></div>
</div>
<div class="yarn-ball yarn-ball-1"></div><div class="yarn-ball yarn-ball-2"></div><div class="yarn-ball yarn-ball-3"></div>
<div class="yarn-thread yarn-thread-1"></div><div class="yarn-thread yarn-thread-2"></div>
</div>
</div>
<div class="rail">
<span class="story-label">编织态</span>
<div class="mascot weaving">
<div class="fox">
<div class="fox-ear-l"></div><div class="fox-ear-r"></div>
<div class="fox-head"><div class="fox-eye-l"></div><div class="fox-eye-r"></div><div class="fox-nose"></div><div class="fox-snout"></div></div>
<div class="fox-body"></div><div class="fox-tail"></div>
</div>
<div class="needle needle-l"></div><div class="needle needle-r"></div><div class="thread"></div>
</div>
</div>
<div class="rail">
<span class="story-label">完成态</span>
<div class="mascot completed">
<div class="fox">
<div class="fox-ear-l"></div><div class="fox-ear-r"></div>
<div class="fox-head"><div class="fox-eye-l"></div><div class="fox-eye-r"></div><div class="fox-nose"></div><div class="fox-snout"></div></div>
<div class="fox-body"></div><div class="fox-tail"></div>
</div>
<div class="chk-circle"></div><div class="chk-mark"></div>
<div class="arm arm-l"></div><div class="arm arm-r"></div>
</div>
</div>
<div class="rail">
<span class="story-label">困惑态</span>
<div class="mascot confused">
<div class="fox">
<div class="fox-ear-l"></div><div class="fox-ear-r"></div>
<div class="fox-head"><div class="fox-eye-l"></div><div class="fox-eye-r"></div><div class="fox-nose"></div><div class="fox-snout"></div></div>
<div class="fox-body"></div><div class="fox-tail"></div>
</div>
<div class="qmark">?</div>
<div class="th-broken th-broken-l"></div><div class="th-broken th-broken-r"></div>
</div>
</div>
<div class="rail">
<span class="story-label">庆祝态</span>
<div class="mascot celebrating">
<div class="fox">
<div class="fox-ear-l"></div><div class="fox-ear-r"></div>
<div class="fox-head"><div class="fox-eye-l"></div><div class="fox-eye-r"></div><div class="fox-nose"></div><div class="fox-snout"></div></div>
<div class="fox-body"></div><div class="fox-tail"></div>
</div>
<div class="arm arm-l"></div><div class="arm arm-r"></div>
<div class="dot dot-d1"></div><div class="dot dot-d2"></div><div class="dot dot-d3"></div><div class="dot dot-d4"></div><div class="dot dot-d5"></div><div class="dot dot-d6"></div>
<div class="celeb-yarn celeb-yarn-1"></div><div class="celeb-yarn celeb-yarn-2"></div>
</div>
</div>
</div>
</div>
</body>
</html>
