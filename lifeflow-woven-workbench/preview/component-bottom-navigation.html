<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
<style>
/* Page scaffold — NOT extracted */
body { margin: 0; padding: var(--space-md); background: var(--color-surface); font-family: var(--font-family-body); display: flex; flex-direction: column; align-items: center; gap: var(--space-xl); }
.specimen { display: flex; flex-direction: column; align-items: center; gap: var(--space-sm); }
.story-label { font-size: var(--font-size-caption); color: var(--color-text-secondary); font-weight: var(--font-weight-medium); text-transform: none; }
.stage { width: 375px; height: 80px; position: relative; overflow: visible; border-radius: var(--radius-lg); background: var(--color-text-inverse); }

/* @component-css-start */
/* Component definitions — extracted to components.css */
.bnav { position: absolute; bottom: 0; left: 0; right: 0; height: 64px; background: var(--color-surface); display: flex; align-items: center; justify-content: space-around; border-top: 1px solid var(--color-border); }
.bnav::before { content: ''; position: absolute; top: 0; left: var(--space-sm); right: var(--space-sm); height: 2px; background: repeating-linear-gradient(90deg, var(--color-border-dashed) 0, var(--color-border-dashed) 3px, transparent 3px, transparent 6px); }
.bnav-tab { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; flex-shrink: 0; cursor: pointer; min-width: 0; padding: var(--space-xs) 0; transition: color .15s; color: var(--color-text-tertiary); }
.bnav-tab:hover { filter: brightness(.92); }
.bnav-tab .lucide { width: 22px; height: 22px; }
.bnav-label { font-size: var(--font-size-caption); margin-top: 2px; white-space: nowrap; line-height: var(--line-height-tight); }
.bnav-tab.active { color: var(--color-primary); }
.bnav-tab.active:hover { filter: brightness(.92); }
.bnav-fab { position: absolute; top: -28px; left: 50%; transform: translateX(-50%); width: 56px; height: 56px; border-radius: var(--radius-full); background: var(--color-primary); display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-3); cursor: pointer; z-index: 1; transition: filter .15s; }
.bnav-fab:hover { filter: brightness(.92); }
.bnav-fab .lucide { width: 26px; height: 26px; color: var(--color-text-inverse); }
.bnav-badge { position: absolute; top: 0; right: 4px; width: 8px; height: 8px; border-radius: var(--radius-full); background: var(--color-primary); }
/* @component-css-end */
</style>
</head>
<body>

<div class="specimen" data-evidence-sample="home-active">
  <span class="story-label">主页激活</span>
  <div class="stage">
    <div class="bnav">
      <div class="bnav-tab active">
        <i data-lucide="home"></i>
        <span class="bnav-label">主页</span>
        <span class="bnav-badge"></span>
      </div>
      <div class="bnav-tab">
        <i data-lucide="calendar-days"></i>
        <span class="bnav-label">规划</span>
      </div>
      <div class="bnav-tab">
        <i data-lucide="rotate-ccw"></i>
        <span class="bnav-label">回顾</span>
      </div>
      <div class="bnav-tab">
        <i data-lucide="message-circle"></i>
        <span class="bnav-label">助手</span>
      </div>
      <div class="bnav-tab">
        <i data-lucide="bar-chart-3"></i>
        <span class="bnav-label">统计</span>
      </div>
      <div class="bnav-fab">
        <i data-lucide="plus"></i>
      </div>
    </div>
  </div>
</div>

      </div>
      <div class="bnav-tab">
        <i data-lucide="message-circle"></i>
        <span class="bnav-label">助手</span>
      </div>
      <div class="bnav-tab">
        <i data-lucide="bar-chart-3"></i>
        <span class="bnav-label">统计</span>
      </div>
      <div class="bnav-fab">
        <i data-lucide="plus"></i>
      </div>
    </div>
  </div>

      </div>

        <i data-lucide="calendar-days"></i>

      </div>

        <i data-lucide="rotate-ccw"></i>

      </div>
      <div class="bnav-tab">

        <span class="bnav-label">助手</span>

    </div>
  </div>
</div>

<script>lucide.createIcons();</script>
</body>
</html>
